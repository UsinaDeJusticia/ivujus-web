<!doctype html>
<!-- @dsCard group="Colors" name="Tokens de fondo" subtitle="bg-base, bg-subtle, bg-muted, bg-inverted, bg-dark" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Fondos semánticos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row" style="gap: 10px;">
  
    <div style="flex: 1; background: #FFFFFF; border: 1px solid var(--border-subtle); border-radius: 4px; padding: 14px; color: #1F2328; display: flex; flex-direction: column; gap: 4px; min-height: 96px;">
      <div class="mono" style="color: #1F2328; opacity: 0.85; font-size: 10px;">--bg-base</div>
      <div style="font-size: 11px; line-height: 1.4;">Base — fondo por defecto</div>
    </div>
  
    <div style="flex: 1; background: #F8F9FA; border: 1px solid var(--border-subtle); border-radius: 4px; padding: 14px; color: #1F2328; display: flex; flex-direction: column; gap: 4px; min-height: 96px;">
      <div class="mono" style="color: #1F2328; opacity: 0.85; font-size: 10px;">--bg-subtle</div>
      <div style="font-size: 11px; line-height: 1.4;">Subtle — bandas suaves</div>
    </div>
  
    <div style="flex: 1; background: #F4F7FA; border: 1px solid var(--border-subtle); border-radius: 4px; padding: 14px; color: #1F2328; display: flex; flex-direction: column; gap: 4px; min-height: 96px;">
      <div class="mono" style="color: #1F2328; opacity: 0.85; font-size: 10px;">--bg-muted</div>
      <div style="font-size: 11px; line-height: 1.4;">Muted — secciones azuladas</div>
    </div>
  
    <div style="flex: 1; background: #0D3B66; border: 1px solid var(--border-subtle); border-radius: 4px; padding: 14px; color: #FFFFFF; display: flex; flex-direction: column; gap: 4px; min-height: 96px;">
      <div class="mono" style="color: #FFFFFF; opacity: 0.85; font-size: 10px;">--bg-inverted</div>
      <div style="font-size: 11px; line-height: 1.4;">Inverted — CTAs, footer</div>
    </div>
  
    <div style="flex: 1; background: #0A2E50; border: 1px solid var(--border-subtle); border-radius: 4px; padding: 14px; color: #FFFFFF; display: flex; flex-direction: column; gap: 4px; min-height: 96px;">
      <div class="mono" style="color: #FFFFFF; opacity: 0.85; font-size: 10px;">--bg-dark</div>
      <div style="font-size: 11px; line-height: 1.4;">Dark — fondo enfático</div>
    </div>
  
</div>
</div></body></html>
