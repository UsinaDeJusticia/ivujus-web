<!doctype html>
<!-- @dsCard group="Components" name="Estados del botón" subtitle="Default, hover, focus, active, disabled" viewport="700x160" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Estados del botón principal</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row wrap" style="gap: 14px; align-items: center;">
  
    <div class="col" style="gap: 6px; align-items: center;">
      <button style="font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 24px; border-radius: 4px; cursor: pointer; transition: all 200ms; border: 1px solid transparent; background: var(--azul-800); color: #fff;">Inscribirse</button>
      <div class="mono" style="font-size: 10px;">Default</div>
    </div>
  
    <div class="col" style="gap: 6px; align-items: center;">
      <button style="font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 24px; border-radius: 4px; cursor: pointer; transition: all 200ms; border: 1px solid transparent; background: var(--azul-900); color: #fff;">Inscribirse</button>
      <div class="mono" style="font-size: 10px;">Hover</div>
    </div>
  
    <div class="col" style="gap: 6px; align-items: center;">
      <button style="font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 24px; border-radius: 4px; cursor: pointer; transition: all 200ms; border: 1px solid transparent; background: var(--azul-800); color: #fff; box-shadow: 0 0 0 3px rgba(201,164,106,0.40);">Inscribirse</button>
      <div class="mono" style="font-size: 10px;">Focus</div>
    </div>
  
    <div class="col" style="gap: 6px; align-items: center;">
      <button style="font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 24px; border-radius: 4px; cursor: pointer; transition: all 200ms; border: 1px solid transparent; background: var(--azul-900); color: #fff; opacity: 0.92;">Inscribirse</button>
      <div class="mono" style="font-size: 10px;">Active</div>
    </div>
  
    <div class="col" style="gap: 6px; align-items: center;">
      <button style="font-family: var(--font-body); font-size: 12px; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 14px 24px; border-radius: 4px; cursor: pointer; transition: all 200ms; border: 1px solid transparent; background: var(--azul-800); color: #fff; opacity: 0.45; cursor: not-allowed;">Inscribirse</button>
      <div class="mono" style="font-size: 10px;">Disabled</div>
    </div>
  
</div>
</div></body></html>
