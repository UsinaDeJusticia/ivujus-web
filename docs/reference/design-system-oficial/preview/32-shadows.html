<!doctype html>
<!-- @dsCard group="Spacing" name="Elevación" subtitle="Sombras tenues en azul translúcido" viewport="700x220" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Elevación / sombras</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row" style="gap: 18px; padding: 6px 0 18px;">
  
    <div class="col" style="flex: 1; gap: 10px; align-items: center;">
      <div style="width: 100%; aspect-ratio: 1.4/1; background: #fff; border: 1px solid var(--border-subtle); border-radius: 4px; box-shadow: none;"></div>
      <div class="mono" style="text-align: center;">--shadow-0</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">none</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 10px; align-items: center;">
      <div style="width: 100%; aspect-ratio: 1.4/1; background: #fff; border: 1px solid var(--border-subtle); border-radius: 4px; box-shadow: 0 1px 2px rgba(13,59,102,0.06);"></div>
      <div class="mono" style="text-align: center;">--shadow-1</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">sutil</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 10px; align-items: center;">
      <div style="width: 100%; aspect-ratio: 1.4/1; background: #fff; border: 1px solid var(--border-subtle); border-radius: 4px; box-shadow: 0 2px 8px rgba(13,59,102,0.08);"></div>
      <div class="mono" style="text-align: center;">--shadow-2</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">elevación base</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 10px; align-items: center;">
      <div style="width: 100%; aspect-ratio: 1.4/1; background: #fff; border: 1px solid var(--border-subtle); border-radius: 4px; box-shadow: 0 8px 24px rgba(13,59,102,0.10);"></div>
      <div class="mono" style="text-align: center;">--shadow-3</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">elevación alta</div>
    </div>
  
</div>
<div style="font-size: 11px; color: var(--fg-4); border-top: 1px solid var(--border-subtle); padding-top: 10px; line-height: 1.5;">
  Sombras tenues en azul translúcido — nunca en negro puro. Sombras dramáticas están vetadas por el manual.
</div>
</div></body></html>
