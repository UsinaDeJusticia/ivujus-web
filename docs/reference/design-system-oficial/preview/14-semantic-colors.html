<!doctype html>
<!-- @dsCard group="Colors" name="Colores semánticos" subtitle="Info, éxito, atención, error — tonos calmados" viewport="700x230" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Colores semánticos</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row" style="gap: 14px;">
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #2F6493; border-radius: 4px; height: 82px;"></div>
      <div style="font-weight: 600; font-size: 12px; color: var(--azul-900);">Info</div>
      <div class="mono" style="font-size: 10px; color: var(--fg-4);">--feedback-info<br>#2F6493</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #3F7A5A; border-radius: 4px; height: 82px;"></div>
      <div style="font-weight: 600; font-size: 12px; color: var(--azul-900);">Éxito</div>
      <div class="mono" style="font-size: 10px; color: var(--fg-4);">--feedback-success<br>#3F7A5A</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #B5905C; border-radius: 4px; height: 82px;"></div>
      <div style="font-weight: 600; font-size: 12px; color: var(--azul-900);">Atención</div>
      <div class="mono" style="font-size: 10px; color: var(--fg-4);">--feedback-warning<br>#B5905C</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #9B3A3A; border-radius: 4px; height: 82px;"></div>
      <div style="font-weight: 600; font-size: 12px; color: var(--azul-900);">Error</div>
      <div class="mono" style="font-size: 10px; color: var(--fg-4);">--feedback-danger<br>#9B3A3A</div>
    </div>
  
</div>
<div style="font-size: 11px; color: var(--fg-4); border-top: 1px solid var(--border-subtle); padding-top: 10px; line-height: 1.5;">
  Tonos calmados, nunca chillones. Reservados a estados de formulario y notificaciones.
</div>
</div></body></html>
