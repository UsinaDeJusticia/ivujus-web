<!doctype html>
<!-- @dsCard group="Spacing" name="Radios" subtitle="none, xs, sm, md, lg, pill" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Radios</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row" style="gap: 18px; align-items: flex-end;">
  
    <div class="col" style="flex: 1; gap: 8px; align-items: center;">
      <div style="width: 72px; height: 56px; background: var(--azul-100); border: 1px solid var(--azul-300); border-radius: 0px;"></div>
      <div class="mono" style="text-align: center;">--radius-none</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">0px</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px; align-items: center;">
      <div style="width: 72px; height: 56px; background: var(--azul-100); border: 1px solid var(--azul-300); border-radius: 2px;"></div>
      <div class="mono" style="text-align: center;">--radius-xs</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">2px</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px; align-items: center;">
      <div style="width: 72px; height: 56px; background: var(--azul-100); border: 1px solid var(--azul-300); border-radius: 4px;"></div>
      <div class="mono" style="text-align: center;">--radius-sm</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">4px</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px; align-items: center;">
      <div style="width: 72px; height: 56px; background: var(--azul-100); border: 1px solid var(--azul-300); border-radius: 6px;"></div>
      <div class="mono" style="text-align: center;">--radius-md</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">6px</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px; align-items: center;">
      <div style="width: 72px; height: 56px; background: var(--azul-100); border: 1px solid var(--azul-300); border-radius: 10px;"></div>
      <div class="mono" style="text-align: center;">--radius-lg</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">10px</div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px; align-items: center;">
      <div style="width: 72px; height: 56px; background: var(--azul-100); border: 1px solid var(--azul-300); border-radius: 999px;"></div>
      <div class="mono" style="text-align: center;">--radius-pill</div>
      <div class="mono" style="text-align: center; color: var(--fg-4); font-size: 9.5px;">999 (pill)px</div>
    </div>
  
</div>
</div></body></html>
