<!doctype html>

<html lang="es">
<head>
<meta charset="utf-8">
<title>Botones</title>
<link rel="stylesheet" href="../colors_and_type.css">

</head>
<body><div class="card">
<div class="row" style="gap: 14px; align-items: center;">

<div class="row" style="gap: 14px; color: var(--fg-4); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 6px;">

  <span style="flex: 1; text-align: center;">SECUNDARIO · acento dorado</span>
