<!doctype html>
<!-- @dsCard group="Colors" name="Paleta primaria" subtitle="Azul institucional, dorado acento, gris apoyo, blanco" viewport="700x260" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Paleta primaria</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row" style="gap: 14px;">
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #0D3B66; border: 1px solid var(--border-subtle); border-radius: 4px; aspect-ratio: 1.15/1; display: flex; align-items: flex-end; padding: 10px; color: #fff;">
        <div style="font-family: var(--font-display); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;">0D3B66</div>
      </div>
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 11px; color: var(--azul-900); letter-spacing: 0.1em; text-transform: uppercase;">Azul institucional</div>
      <div class="mono" style="font-size: 10px; line-height: 1.5;">
        HEX #0D3B66<br>
        RGB 13, 59, 102
      </div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #C9A46A; border: 1px solid var(--border-subtle); border-radius: 4px; aspect-ratio: 1.15/1; display: flex; align-items: flex-end; padding: 10px; color: #1F2328;">
        <div style="font-family: var(--font-display); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;">C9A46A</div>
      </div>
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 11px; color: var(--azul-900); letter-spacing: 0.1em; text-transform: uppercase;">Dorado acento</div>
      <div class="mono" style="font-size: 10px; line-height: 1.5;">
        HEX #C9A46A<br>
        RGB 201, 164, 106
      </div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #6B7280; border: 1px solid var(--border-subtle); border-radius: 4px; aspect-ratio: 1.15/1; display: flex; align-items: flex-end; padding: 10px; color: #fff;">
        <div style="font-family: var(--font-display); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;">6B7280</div>
      </div>
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 11px; color: var(--azul-900); letter-spacing: 0.1em; text-transform: uppercase;">Gris apoyo</div>
      <div class="mono" style="font-size: 10px; line-height: 1.5;">
        HEX #6B7280<br>
        RGB 107, 114, 128
      </div>
    </div>
  
    <div class="col" style="flex: 1; gap: 8px;">
      <div style="background: #FFFFFF; border: 1px solid var(--border-subtle); border-radius: 4px; aspect-ratio: 1.15/1; display: flex; align-items: flex-end; padding: 10px; color: #1F2328;">
        <div style="font-family: var(--font-display); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;">FFFFFF</div>
      </div>
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 11px; color: var(--azul-900); letter-spacing: 0.1em; text-transform: uppercase;">Blanco</div>
      <div class="mono" style="font-size: 10px; line-height: 1.5;">
        HEX #FFFFFF<br>
        RGB 255, 255, 255
      </div>
    </div>
  
</div>
