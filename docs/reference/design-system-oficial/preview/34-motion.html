<!doctype html>
<!-- @dsCard group="Spacing" name="Movimiento" subtitle="Duraciones y easings · respeta reduced-motion" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Movimiento</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="col" style="gap: 14px;">
  <div class="row" style="gap: 24px;">
    <div class="col" style="flex: 1; gap: 4px;">
      <div class="label">Duraciones</div>
      <div class="mono" style="font-size: 11px; line-height: 1.7;">
        --motion-fast &nbsp; 120ms<br>
        --motion-base &nbsp; 200ms<br>
        --motion-slow &nbsp; 320ms
      </div>
    </div>
    <div class="col" style="flex: 1.4; gap: 4px;">
      <div class="label">Easings</div>
      <div class="mono" style="font-size: 11px; line-height: 1.7;">
        --easing-standard &nbsp; cubic-bezier(0.4, 0, 0.2, 1)<br>
        --easing-out &nbsp; cubic-bezier(0.16, 1, 0.3, 1)
      </div>
    </div>
  </div>
  <div style="border-top: 1px solid var(--border-subtle); padding-top: 10px; font-size: 11px; color: var(--fg-4); line-height: 1.55;">
    Movimiento mínimo y funcional. Sin parallax, sin loops, sin bounce. <strong style="color: var(--fg-3);">Respeta <span class="mono" style="background: var(--gris-100); padding: 1px 4px;">prefers-reduced-motion</span>.</strong>
  </div>
</div>
</div></body></html>
