<!doctype html>
<!-- @dsCard group="Brand" name="Logo clearspace" subtitle="Área de seguridad = altura de la 'I'" viewport="700x220" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Logo clearspace</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row" style="gap: 24px; align-items: center;">
  <div style="position: relative; flex-shrink: 0;">
    <div style="position: relative; background: #fff; border: 1px dashed var(--azul-300); padding: 36px 48px;">
      <img src="../assets/logo-ivujus-primary.jpeg" alt="" style="height: 92px; display: block; mix-blend-mode: multiply;">
      <span style="position: absolute; top: 6px; left: 50%; transform: translateX(-50%); font-family: var(--font-display); color: var(--azul-700); font-size: 14px;">I</span>
      <span style="position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); font-family: var(--font-display); color: var(--azul-700); font-size: 14px;">I</span>
      <span style="position: absolute; left: 8px; top: 50%; transform: translateY(-50%); font-family: var(--font-display); color: var(--azul-700); font-size: 14px;">I</span>
      <span style="position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-family: var(--font-display); color: var(--azul-700); font-size: 14px;">I</span>
    </div>
  </div>
  <div class="col" style="gap: 6px; flex: 1;">
    <span class="eyebrow">Área de seguridad</span>
    <div style="font-size: 14px; line-height: 1.55; color: var(--fg-2); max-width: 38ch;">
      El espacio mínimo alrededor del logo debe ser equivalente al alto de la letra <strong>"I"</strong> del logotipo. Aplica en los cuatro lados, sin excepción.
    </div>
  </div>
</div>
</div></body></html>
