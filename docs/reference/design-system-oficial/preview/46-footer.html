<!doctype html>
<!-- @dsCard group="Components" name="Footer institucional" subtitle="Azul-900 + logo negativo + datos de contacto" viewport="700x160" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Footer institucional</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="card dark" style="background: var(--azul-900); color: #fff; padding: 26px 28px; border-radius: 4px; margin: -28px -32px; min-height: calc(100% + 56px);">
  <div class="row" style="gap: 24px; align-items: center;">
    <img src="../assets/logo-ivujus-mark-white.png" alt="IVUJUS" style="height: 88px; width: auto; flex-shrink: 0;">
    <div class="col" style="gap: 6px; flex: 1; border-left: 1px solid rgba(255,255,255,0.14); padding-left: 22px;">
      <div style="font-family: var(--font-display); font-size: 14px; letter-spacing: 0.18em; color: #fff;">IVUJUS</div>
      <div style="font-size: 11px; color: var(--azul-200); line-height: 1.55;">Instituto de Victimología<br>de Usina de Justicia</div>
      <div style="font-size: 11px; color: var(--dorado-400); font-style: italic; margin-top: 2px;">Conocimiento que ilumina, formación que transforma.</div>
    </div>
    <div class="col" style="gap: 4px; font-size: 11px; color: var(--azul-200); text-align: right; min-width: 160px;">
      <div style="color: #fff; font-weight: 600;">www.ivujus.org.ar</div>
      <div style="color: var(--dorado-300);">info@ivujus.org.ar</div>
      <div style="font-size: 10px; color: var(--azul-300); margin-top: 8px;">© 2026 Usina de Justicia</div>
    </div>
  </div>
</div>
</div></body></html>
