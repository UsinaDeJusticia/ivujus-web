<!doctype html>
<!-- @dsCard group="Brand" name="Reglas de uso del logo" subtitle="No deformar · no cambiar colores · no modificar tipografía · mantener legibilidad" viewport="700x200" -->
<html lang="es">
<head>
<meta charset="utf-8">
<title>Reglas de uso</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="card.css">
</head>
<body><div class="card">
<div class="row wrap" style="gap: 14px;">
  
    <div class="col" style="gap: 4px; flex: 1 1 calc(50% - 7px); border: 1px solid var(--border-subtle); padding: 14px 16px; border-radius: 4px;">
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--azul-900);">No deformar</div>
      <div style="font-size: 12px; color: var(--fg-3); line-height: 1.5;">No estirar, aplastar, inclinar ni rotar.</div>
    </div>
  
    <div class="col" style="gap: 4px; flex: 1 1 calc(50% - 7px); border: 1px solid var(--border-subtle); padding: 14px 16px; border-radius: 4px;">
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--azul-900);">No cambiar colores</div>
      <div style="font-size: 12px; color: var(--fg-3); line-height: 1.5;">Usar siempre las versiones oficiales.</div>
    </div>
  
    <div class="col" style="gap: 4px; flex: 1 1 calc(50% - 7px); border: 1px solid var(--border-subtle); padding: 14px 16px; border-radius: 4px;">
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--azul-900);">No modificar tipografía</div>
      <div style="font-size: 12px; color: var(--fg-3); line-height: 1.5;">No reemplazar las tipografías institucionales.</div>
    </div>
  
    <div class="col" style="gap: 4px; flex: 1 1 calc(50% - 7px); border: 1px solid var(--border-subtle); padding: 14px 16px; border-radius: 4px;">
      <div style="font-family: var(--font-body); font-weight: 600; font-size: 13px; color: var(--azul-900);">Mantener legibilidad</div>
      <div style="font-size: 12px; color: var(--fg-3); line-height: 1.5;">Asegurar contraste adecuado en todos los usos.</div>
    </div>
  
</div>
</div></body></html>
